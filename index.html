<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="FTivfE3wnD8xWW7bJQlWUgxrTJNSI-ILJE7X1QW-Szw" />
    <title>Sunflix - Futuristic AI Entertainment Platform</title>
    <meta name="description" content="Sunflix is a futuristic AI-powered entertainment platform where users can explore trending movies, anime, trailers, wallpapers, voice search, subtitle AI, and immersive cinematic experiences with a modern cyberpunk interface." />
    
    <!-- SEO & Discoverability -->
    <meta name="keywords" content="Sunflix, movies, streaming, anime, AI curator, cyberpunk UI, trailers, TV shows, watch online" />
    <meta name="author" content="Sunflix" />
    <link rel="canonical" href="https://sunflix.app/" />

    <!-- Open Graph / Facebook / Discord -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sunflix.app/" />
    <meta property="og:title" content="Sunflix - Futuristic AI Entertainment Platform" />
    <meta property="og:description" content="Sunflix is a futuristic AI-powered entertainment platform where users can explore trending movies, anime, trailers, wallpapers, voice search, subtitle AI, and immersive cinematic experiences with a modern cyberpunk interface." />
    <meta property="og:image" content="https://sunflix.app/og-image.jpg" />
    <meta property="og:site_name" content="Sunflix" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://sunflix.app/" />
    <meta name="twitter:title" content="Sunflix - Futuristic AI Entertainment Platform" />
    <meta name="twitter:description" content="Sunflix is a futuristic AI-powered entertainment platform where users can explore trending movies, anime, trailers, wallpapers, voice search, subtitle AI, and immersive cinematic experiences with a modern cyberpunk interface." />
    <meta name="twitter:image" content="https://sunflix.app/og-image.jpg" />
    <meta name="twitter:site" content="@sunflix" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Sunflix",
      "url": "https://sunflix.app/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://sunflix.app/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Sunflix",
      "url": "https://sunflix.app/",
      "logo": "https://sunflix.app/vite.svg",
      "sameAs": [
        "https://twitter.com/sunflix"
      ]
    }
    </script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
